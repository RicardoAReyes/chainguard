contents:
  repositories:
    - https://packages.wolfi.dev/os
    # Local packages built with melange
    - /work/packages
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - /work/melange.rsa.pub
  packages:
    # Base system
    - wolfi-baselayout
    - ca-certificates-bundle
    - glibc
    - glibc-locale-posix
    - busybox
    - tzdata

    # Node.js runtime — Ghost requires ^22.13.1
    - nodejs-22

    # SQLite runtime library — native Node module links against this
    - sqlite-libs

    # Ghost CMS (built from npm package via melange)
    - ghost
    - ghost-config-sqlite

work-dir: /var/lib/ghost

entrypoint:
  command: /usr/bin/node /var/lib/ghost/index.js

accounts:
  groups:
    - groupname: ghost
      gid: 65532
  users:
    - username: ghost
      uid: 65532
  run-as: 65532

environment:
  PATH: /usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/bin
  NODE_ENV: production
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

paths:
  - path: /var/lib/ghost
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/lib/ghost/content
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
