contents:
  repositories:
    - https://packages.wolfi.dev/os
    - https://packages.cgr.dev/extras
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - https://packages.cgr.dev/extras/chainguard-extras.rsa.pub
  packages:
    # Base system
    - wolfi-baselayout
    - chainguard-baselayout
    - busybox
    - apk-tools
    - ca-certificates-bundle
    - glibc
    - glibc-locale-posix
    - ld-linux

    # WordPress application
    - wordpress
    - wordpress-oci-entrypoint

    # PHP 8.4 core + FPM
    - php-8.4
    - php-8.4-fpm

    # PHP extensions (base image set)
    - php-8.4-bcmath
    - php-8.4-ctype
    - php-8.4-curl
    - php-8.4-dom
    - php-8.4-fileinfo
    - php-8.4-iconv
    - php-8.4-igbinary
    - php-8.4-imagick
    - php-8.4-intl
    - php-8.4-mbstring
    - php-8.4-mysqli
    - php-8.4-mysqlnd
    - php-8.4-opcache
    - php-8.4-openssl
    - php-8.4-simplexml
    - php-8.4-sodium
    - php-8.4-xml
    - php-8.4-xmlreader
    - php-8.4-xmlwriter
    - php-8.4-zip

    # Added packages
    - php-8.4-gd       # image processing (GD library)
    - php-8.4-xdebug   # local debugging
    - wp-cli           # WP-CLI management tool

entrypoint:
  command: php-fpm

accounts:
  groups:
    - groupname: php
      gid: 65532
  users:
    - username: php
      uid: 65532
  run-as: 65532

environment:
  PATH: /usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/bin
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

paths:
  - path: /var/www/html
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
  - path: /var/run/php
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
