worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name _;

        root /var/www/html;
        index index.php index.html;

        # Serve static files directly, pass everything else to WordPress
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # Pass PHP requests to the WordPress container
        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include /etc/nginx/fastcgi_params;
        }

        # Proxy Grafana — same-origin for iframe embedding
        # No trailing slash on proxy_pass: nginx forwards the full /grafana/... path
        # so Grafana's serve_from_sub_path=true can handle it correctly.
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
